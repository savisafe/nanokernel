name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # Skip the Prisma engine download chatter; generate explicitly below.
          PRISMA_SKIP_POSTINSTALL_GENERATE: "1"

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Prettier
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
